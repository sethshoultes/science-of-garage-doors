name: Build Plugin Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build plugin zip
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          SLUG="aplus-garage-door-science"
          VERSION="${TAG_NAME#v}"
          ZIP_NAME="${SLUG}-${VERSION}.zip"

          mkdir -p "dist/${SLUG}/includes" "dist/${SLUG}/blocks" "dist/${SLUG}/viewers"

          cp aplus-garage-door-science.php "dist/${SLUG}/"
          cp readme.txt "dist/${SLUG}/"
          cp includes/class-updater.php "dist/${SLUG}/includes/"
          cp blocks/block.js "dist/${SLUG}/blocks/"
          cp viewers/*.html "dist/${SLUG}/viewers/"

          cd dist
          zip -rq "${ZIP_NAME}" "${SLUG}/"
          echo "Built ${ZIP_NAME}"
          ls -lh "${ZIP_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aplus-garage-door-science-*.zip
          generate_release_notes: true
